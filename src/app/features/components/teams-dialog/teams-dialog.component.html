@if (visible()) {
  <p-dialog [visible]="true" [header]="team()?.name + ' Details!' | uppercase" class="dialog border-round text-2xl">
    <div class="flex flex-column gap-3 p-3">
      <p class="text-2xl">id: {{ team()!.id }}</p>
      <p>
        <label class="text-2xl">Team name:</label>
        <input class="text-2xl" [ngModel]="selectedName()" (ngModelChange)="onNameChange($event)" placeholder="name" />
        @for (error of nameErrors(); track error) {
          <small class="text-red-500 block">⚠️ {{ error }} </small>
        }
      </p>
      <p>
        <label class="text-2xl">Team color:</label>
        <input class="text-2xl" [ngModel]="selectedColor()" (ngModelChange)="selectedColor.set($event)"
               placeholder="color" />
      </p>
      <div class="flex flex-column gap-2 mb-6 mt-0">
        <p>Heroes:</p>
        <p-multi-select
          [options]="availableHeroes()"
          [ngModel]="heroes()"
          (ngModelChange)="heroes.set($event)"
          optionLabel="name"
          panelStyleClass="overflow-y-auto overflow-x-hidden max-h-6rem"
          placeholder="Select Heroes" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <div class="flex justify-content-center gap-3 w-full mt-2">
        @for (btn of footerButtons; track btn.label) {
          <p-button
            [label]="btn.label"
            (onClick)="!btn.disabled?.() && btn.action()"
            [disabled]="btn.disabled? btn.disabled(): false"
            styleClass="buttons w-6rem h-5rem border-round-xl flex align-items-center justify-content-center" />
        }
      </div>
    </ng-template>
  </p-dialog>
}
