<h1>{{ title }}</h1>
<div class="flex justify-content-center mb-5 gap-3">
  @for (route of displayRoutes; track route.path) {
    @if (route.title) {
      <p-button
        class="routes border-round-xl flex flex-row justify-content-center w-10rem align-items-center h-6rem"
        [label]="route.path"
        [routerLink]="[route.path]"
      />
    }
  }
</div>
<router-outlet></router-outlet>
<app-messages></app-messages>
