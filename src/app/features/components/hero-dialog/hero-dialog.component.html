@if (visible()) {
  <p-dialog [visible]="true" [header]="hero()?.name + ' Details!' | uppercase" class="dialog border-round text-2xl">
    <div class="flex flex-column gap-3 p-3">
      <p class="text-2xl">id: {{ hero()!.id }}</p>
      <p>
        <label class="text-2xl">Hero name:</label>
        <input class="text-2xl" [ngModel]="selectedName()" (ngModelChange)="onNameChange($event)" placeholder="name" />
        @for (error of nameErrors(); track error) {
          <small class="text-red-500 block">⚠️ {{ error }} </small>
        }
      </p>
      <p class="text-2xl">Max Weight: {{ hero()!.maxWeight }}</p>
      <div class="flex flex-column gap-2 mb-6">
        <label class="text-2xl">Equipment:</label>
        <p class="text-2xl" [style.color]="overWeight() ? 'red' : 'green'">
          {{ overWeight() ? 'Over weight limit!' : 'Within weight limit' }}
        </p>
        <p-autoComplete
          [ngModel]="selectedEquipment()"
          (ngModelChange)="selectedEquipment.set($event)"
          [suggestions]="filteredEquipment"
          (completeMethod)="filterEquipment($event)"
          placeholder="Search equipment..."
          optionLabel="type"
          [dropdown]="true"
          [multiple]="true"
          class="text-xl"
          [panelStyle]="{'overflow-y': 'auto', maxHeight: '4rem'}" />
      </div>
      <div class="flex flex-column gap-2 mb-6">
        <label class="text-2xl">Team:</label>
        <p-autoComplete
          [ngModel]="selectedTeam()"
          (ngModelChange)="selectedTeam.set($event)"
          [suggestions]="filteredTeams"
          (completeMethod)="filterTeam($event)"
          placeholder="Search team..."
          optionLabel="name"
          [dropdown]="true"
          class="text-xl background-color-black"
          inputStyleClass="text-2xl text-center"
          [panelStyle]="{'overflow-y': 'auto', maxHeight: '4rem'}" />
      </div>
      <div class="flex flex-column gap-2 mb-6">
        <label class="text-2xl">Status:</label>
        <p-autoComplete
          [ngModel]="selectedStatus()"
          (ngModelChange)="selectedStatus.set($event)"
          [suggestions]="filteredStatus"
          (completeMethod)="filterStatus($event)"
          placeholder="Search Status..."
          [dropdown]="true"
          class="text-xl"
          inputStyleClass="text-2xl text-center"
          [panelStyle]="{'overflow-y': 'auto', maxHeight: '4rem'}" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <div class="flex justify-content-center gap-3 w-full mt-2">
        @for (btn of footerButtons; track btn.label) {
          <p-button
            [label]="btn.label"
            (onClick)="!btn.disabled?.() && btn.action()"
            [disabled]="btn.disabled? btn.disabled(): false"
            styleClass="buttons w-6rem h-5rem border-round-xl flex align-items-center justify-content-center" />
        }
      </div>
    </ng-template>
  </p-dialog>
}
